# Profile
profile: |
  Senior Quantitative Research & Trading leader with 20+ years across FX, crypto, derivatives, and applied AI/ML.
  Currently Head of Trading at Hercle (crypto systematic strategies and market making). Previously Director of Quant/ML Trading at
  Oxford Algorithms and Head of AI/ML at Huma, where the team's UK Biobank sleep-timing study was peer-reviewed and covered by
  the BBC, The Washington Post, and The Guardian. Founded Ainemox in 2021 and solo-built a fully automated HFT crypto
  market-making stack in pure C/C++ across Binance, Bybit, BitMEX, Coinbase, and FTX — $1bn+ cumulative volume.
  Before that, ten years at BNP Paribas across IR exotics, FX prop, credit arbitrage (on BNP's most successful trading desk before
  the Volcker Rule closed it), and eFX automated market making — and was the first person in the finance industry to implement
  hybrid IR/FX pricing on CUDA GPU (2008). Two years at Bank of America Merrill Lynch validating algorithmic trading models
  across eFX, fixed income, and equities. École Polytechnique (Mathematical Finance, DEA Probabilités); Sharif University (BSc EE).
  Gold medal, Iranian Mathematical Olympiad.

